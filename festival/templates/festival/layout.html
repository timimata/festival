<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOS Alive'26</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0d0d0d;
            color: #f5f5f5;
        }

        header {
            display:flex; 
            align-items:center; 
            justify-content:space-between;  
            background: rgb(209, 74, 150);
            padding: 20px;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: black;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        main {
            padding: 40px;
        }

        
        h3 {
            color: rgb(209, 74, 150);
            margin-top: 60px;
        }
        
        .card {
            background: #1a1a1a;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid  rgb(209, 74, 150);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .card a {
            color: #f5f5f5;
            text-decoration: none;
            font-size: 1.2rem;
        }

        .card a:hover {
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #333;
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <header>
        {% load static %}
        <img src="{% static 'festival/NA26.png' %}" alt="NOS Alive" style="height: 150px; vertical-align: middle; margin-right: 15px;">
        <nav>
            <a href="{% url 'index' %}">Início</a>
            <a href="{% url 'dias' %}">Dias</a>
            <a href="{% url 'palcos' %}">Palcos</a>
        </nav>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>Feel the sound. Live the night.</p>
    </footer>

</body>
</html>
